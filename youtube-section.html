<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTubeセクション実装確認 - カミウエ社会保険労務士事務所</title>

<!--
==============================================================
  カミウエ社会保険労務士事務所
  労務管理専門チャンネル 動画セクション
  バージョン: 1.0

  【HPへの設置手順】
  1. <style>〜</style> を HP の <head> 内に追加
  2. <section id="yt-section">〜</section> を設置したい箇所に貼付
  3. <script>〜</script> を </body> 直前に貼付
  4. CONFIG 内の YOUR_API_KEY を実際のAPIキーに変更（下記参照）

  【YouTube Data API v3 キー取得方法】
  1. https://console.cloud.google.com/ にアクセス
  2. プロジェクト作成 → 「APIとサービス」→「ライブラリ」
  3. 「YouTube Data API v3」を検索して有効化
  4. 「認証情報」→「認証情報を作成」→「APIキー」
  5. （推奨）APIキーの制限 → HTTPリファラー → kamiue.com/* を指定
  6. コピーしたキーを下記 YOUR_API_KEY に貼り付け
==============================================================
-->

<style>
/* ========== カミウエ YouTube セクション ========== */
#yt-section {
  padding: 60px 20px 64px;
  background: #f8f9fb;
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic Medium', 'Yu Gothic', sans-serif;
}
#yt-section *, #yt-section *::before, #yt-section *::after {
  box-sizing: border-box;
}
.yt-wrap {
  max-width: 1080px;
  margin: 0 auto;
}

/* --- セクション見出し --- */
.yt-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 36px;
  padding-bottom: 20px;
  border-bottom: 2px solid #e2e6ea;
}
.yt-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.yt-logo {
  width: 42px;
  height: 42px;
  background: #cc0000;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.yt-logo svg { width: 22px; height: 22px; fill: #fff; }
.yt-section-title {
  font-size: 20px;
  font-weight: 700;
  color: #1a1a2e;
  line-height: 1.3;
  letter-spacing: -0.01em;
}
.yt-section-sub {
  font-size: 12px;
  color: #6b7280;
  margin-top: 3px;
  font-weight: 400;
}
.yt-ch-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: #cc0000;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 20px;
  border-radius: 4px;
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: background 0.18s;
  white-space: nowrap;
}
.yt-ch-link:hover { background: #aa0000; }
.yt-ch-link svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }

/* --- グリッド --- */
.yt-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 22px;
}
@media (max-width: 900px) { .yt-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .yt-grid { grid-template-columns: 1fr; } }

/* --- カード --- */
.yt-card {
  display: block;
  text-decoration: none;
  color: inherit;
  background: #fff;
  border: 1px solid #e2e6ea;
  border-radius: 8px;
  overflow: hidden;
  transition: box-shadow 0.22s, transform 0.18s;
}
.yt-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.11);
  transform: translateY(-3px);
}

/* サムネイル */
.yt-thumb-box {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #0f0f0f;
  overflow: hidden;
}
.yt-thumb-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.28s;
}
.yt-card:hover .yt-thumb-box img { transform: scale(1.04); }
.yt-play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0);
  transition: background 0.2s;
}
.yt-card:hover .yt-play-overlay { background: rgba(0,0,0,0.22); }
.yt-play-btn {
  width: 50px;
  height: 50px;
  background: rgba(204,0,0,0.88);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.75);
  transition: opacity 0.2s, transform 0.2s;
}
.yt-card:hover .yt-play-btn { opacity: 1; transform: scale(1); }
.yt-play-btn svg { width: 18px; height: 18px; fill: #fff; margin-left: 3px; }

/* カード本文 */
.yt-card-body { padding: 14px 16px 16px; }
.yt-vtitle {
  font-size: 13px;
  font-weight: 600;
  color: #1a1a2e;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.8em;
}
.yt-meta {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.yt-meta-sep { color: #d1d5db; }

/* --- フッター --- */
.yt-footer {
  text-align: center;
  margin-top: 32px;
}
.yt-more-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #1a1a2e;
  border: 1.5px solid #1a1a2e;
  padding: 10px 32px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  letter-spacing: 0.04em;
  transition: background 0.18s, color 0.18s;
}
.yt-more-link:hover { background: #1a1a2e; color: #fff; }
.yt-more-link svg { width: 14px; height: 14px; fill: currentColor; }

/* --- ローディング / エラー --- */
.yt-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 48px 16px;
  color: #9ca3af;
  font-size: 14px;
  line-height: 1.8;
}
.yt-spinner {
  width: 30px; height: 30px;
  border: 3px solid #e2e6ea;
  border-top-color: #cc0000;
  border-radius: 50%;
  animation: ytspin 0.75s linear infinite;
  margin: 0 auto 12px;
}
@keyframes ytspin { to { transform: rotate(360deg); } }
.yt-state a { color: #cc0000; font-weight: 600; text-decoration: none; }
.yt-state a:hover { text-decoration: underline; }
/* ========== ここまで ========== */
</style>

</head>
<body style="margin:0;background:#fff;">

<!-- =====================================================
     HPに貼り付けるセクション（この<section>ブロック全体）
     ===================================================== -->
<section id="yt-section">
  <div class="yt-wrap">

    <!-- ヘッダー -->
    <div class="yt-header">
      <div class="yt-header-left">
        <div class="yt-logo">
          <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.5 15.6V8.4L15.8 12l-6.3 3.6z"/></svg>
        </div>
        <div>
          <div class="yt-section-title">労務管理専門チャンネル</div>
          <div class="yt-section-sub">カミウエ社会保険労務士事務所 公式YouTube</div>
        </div>
      </div>
      <a href="https://www.youtube.com/channel/UCN0gus5F7Hdi0bzQJJ0NLVw" target="_blank" rel="noopener noreferrer" class="yt-ch-link" id="yt-ch-btn">
        <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.5 15.6V8.4L15.8 12l-6.3 3.6z"/></svg>
        チャンネルを見る
      </a>
    </div>

    <!-- 動画グリッド（JSで自動挿入） -->
    <div class="yt-grid" id="yt-grid">
      <div class="yt-state">
        <div class="yt-spinner"></div>
        動画を読み込んでいます...
      </div>
    </div>

    <!-- フッター -->
    <div class="yt-footer">
      <a href="https://www.youtube.com/channel/UCN0gus5F7Hdi0bzQJJ0NLVw" target="_blank" rel="noopener noreferrer" class="yt-more-link">
        すべての動画を見る
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </a>
    </div>

  </div>
</section>
<!-- =====================================================
     ここまで（<section> ブロック終わり）
     ===================================================== -->

<!-- =====================================================
     スクリプト（</body>直前に設置）
     ===================================================== -->
<script>
(async function () {
  /**
   * ==============================================================
   * 設定項目
   * セキュリティのため、Google Cloud Consoleにて「HTTPリファラー」の制限
   * (kamiue.com/*) を設定することを強くお勧めします。
   * ==============================================================
   */
  const CONFIG = {
    API_KEY: 'AIzaSyBtuFKMfSuvHBJi9mA2ECNY-O3y4hayxPE',
    CHANNEL_ID: 'UCN0gus5F7Hdi0bzQJJ0NLVw',
    MAX_RESULTS: 6,
    BASE_URL: 'https://www.googleapis.com/youtube/v3'
  };

  const CHANNEL_URL = `https://www.youtube.com/channel/${CONFIG.CHANNEL_ID}`;
  const grid = document.getElementById('yt-grid');

  /* ---- ユーティリティ ---- */
  const fmtDate = (iso) => {
    const d = new Date(iso);
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  };

  const fmtViews = (n) => {
    const num = parseInt(n, 10) || 0;
    if (num >= 10000) return `${(Math.floor(num / 1000) / 10).toFixed(0)}万回視聴`;
    if (num >= 1000)  return `${Math.floor(num / 100) / 10}K回視聴`;
    return `${num.toLocaleString('ja-JP')}回視聴`;
  };

  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const showErr = (msg) => {
    grid.innerHTML = `<div class="yt-state">${msg}</div>`;
  };

  /* ---- API呼び出し ---- */
  const apiFetch = async (endpoint, params = {}) => {
    const query = new URLSearchParams({ ...params, key: CONFIG.API_KEY }).toString();
    const response = await fetch(`${CONFIG.BASE_URL}/${endpoint}?${query}`);
    
    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      console.error('[YouTube API Error]', errorData);
      throw new Error(errorData.error?.message || `HTTP ${response.status}`);
    }
    return response.json();
  };

  /* ---- メイン処理 ---- */
  try {
    // 1: uploads プレイリストID取得
    const channelData = await apiFetch('channels', {
      part: 'contentDetails',
      id: CONFIG.CHANNEL_ID
    });

    if (!channelData.items?.length) throw new Error('チャンネルが見つかりません');
    const uploadsId = channelData.items[0].contentDetails.relatedPlaylists.uploads;

    // 2: プレイリストから動画リスト取得
    const playlistData = await apiFetch('playlistItems', {
      part: 'snippet',
      playlistId: uploadsId,
      maxResults: CONFIG.MAX_RESULTS
    });

    const videos = (playlistData.items || []).map(item => ({
      id: item.snippet.resourceId.videoId,
      snippet: item.snippet
    }));

    if (!videos.length) {
      showErr(`現在、公開されている動画はありません。<br><a href="${esc(CHANNEL_URL)}" target="_blank" rel="noopener">チャンネルを確認する</a>`);
      return;
    }

    // 3: 視聴回数取得
    const videoIds = videos.map(v => v.id).join(',');
    const statsData = await apiFetch('videos', {
      part: 'statistics',
      id: videoIds
    });

    const statsMap = {};
    (statsData.items || []).forEach(item => { statsMap[item.id] = item.statistics; });

    // 4: DOM に描画
    const html = videos.map(v => {
      const sn = v.snippet;
      const stats = statsMap[v.id] || {};
      const thumb = (sn.thumbnails.maxres || sn.thumbnails.high || sn.thumbnails.medium || sn.thumbnails.default || {}).url || '';
      const views = stats.viewCount ? fmtViews(stats.viewCount) : '';
      const title = esc(sn.title);
      const date = fmtDate(sn.publishedAt);
      const vUrl = `https://www.youtube.com/watch?v=${v.id}`;

      return `
        <a href="${esc(vUrl)}" target="_blank" rel="noopener noreferrer" class="yt-card">
          <div class="yt-thumb-box">
            <img src="${esc(thumb)}" alt="${title}" loading="lazy">
            <div class="yt-play-overlay">
              <div class="yt-play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
            </div>
          </div>
          <div class="yt-card-body">
            <div class="yt-vtitle">${title}</div>
            <div class="yt-meta">
              <span>${date}</span>
              ${views ? `<span class="yt-meta-sep">·</span><span>${views}</span>` : ''}
            </div>
          </div>
        </a>`;
    }).join('');

    grid.innerHTML = html;

  } catch (err) {
    console.error('[KamiueYT] エラー:', err);
    showErr(
      `動画の読み込みに失敗しました。<br><a href="${esc(CHANNEL_URL)}" target="_blank" rel="noopener">YouTubeチャンネルを直接ご覧ください →</a>`
    );
  }
})();
</script>
<!-- =====================================================
     スクリプト終わり
     ===================================================== -->

</body>
</html>
